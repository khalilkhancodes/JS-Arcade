<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="JS Project Lab - A specialized collection of interactive mini-applications designed to showcase mastery in Vanilla JavaScript.">
    <title>JS Project Lab</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-(--AppBackground) text--(--primaryText) font-sans antialiased selection:bg-(--AccentElements) selection:text-white">

    <header class="w-full bg-(--AppBackground)/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200/60">
        <nav class="max-w-[90%] m-auto flex justify-between items-center p-5">
            <div class="flex items-center space-x-2 cursor-pointer transition-transform hover:scale-105">
                <div class="bg-(--AccentElements) text-white px-3 py-2 rounded-lg">
                    <i class="ph-bold ph-code text-lg"></i>
                </div>
                <span class="font-bold text-lg text-(--AccentElements)">JS Project Lab</span>
            </div>

            <ul class="hidden md:flex space-x-8 items-center font-medium text-(--paragraphColor)">
                <li><a href="#" class="hover:text-(--AccentElements) text-sm transition-colors">Home</a></li>
                <li class="relative group cursor-pointer">
                    <div class="flex items-center space-x-1 hover:text-(--AccentElements) transition-colors py-2">
                        <span><a href="#projects"
                                class="text-(--paragraphColor) text-sm hover:text-(--AccentElements) transition-colors ">Projects</a></span>
                        <i class="ph ph-caret-down text-sm transition-transform group-hover:rotate-180"></i>
                    </div>
                    <div
                        class="absolute top-full left-0 mt-2 md:w-xl bg-(--white) border border-gray-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 z-10">
                        <div id="mdProjectDropDownContent" class="grid md:grid-cols-3 sm:grid-cols-2 gap-2 p-4">
                            <a href="">Calculator</a>
                            <!-- Project List will be dynamically injected here by main.js -->
                        </div>
                    </div>
                </li>
                <li><a href="https://portfolio-xi-sandy-71.vercel.app/"
                        class="hover:text-(--AccentElements) text-sm transition-colors">Portfolio</a></li>
            </ul>

            <div class="hidden md:flex items-center space-x-6">
                <i id="themeToggle"
                    class="ph-fill ph-moon darkmode text-sm text-(--paragraphColor) hover:text-(--AccentElements) cursor-pointer transition-colors"></i>
                <a href="#"
                    class="flex items-center space-x-2 text-(--paragraphColor) hover:text-(--primaryText) font-medium">
                    <i class="ph-fill ph-github-logo text-sm"></i>
                    <span class="text-sm">GitHub</span>
                </a>
            </div>

            <button id="Menu" class="md:hidden text-(--primaryText) text-2xl">
                <i class="ph ph-list"></i>
            </button>
        </nav>

        <div id="mobile-menu"
            class="hidden w-full bg-white border-b border-gray-100 absolute left-0 top-full shadow-lg">
            <div class="flex flex-col p-4 text-(--collaborate) font-medium space-y-2">
                <a href="#" class="block px-4 py-3 bg-gray-50 rounded-lg text-(--AccentElements)    ">Home</a>
                <div id="ProjectDropDown" class="flex justify-between items-center px-4 py-3 cursor-pointer">
                    <span>Projects</span>
                    <i class="ph ph-caret-down"></i>
                </div>
                <div id="DropDownContent"
                    class="hidden w-full bg-gray-50 rounded-lg overflow-hidden transition-all duration-300">
                    <div id="projectDropDownContent" class="grid grid-cols-2">
                        <!-- Projects will be added dynamically -->
                        <a href="">Calculator</a>
                    </div>
                </div>
                <a href="https://portfolio-xi-sandy-71.vercel.app/" class="block px-4 py-3 ">Portfolio</a>
                <hr class="border-black my-4">
                <a href="https://github.com/khalilkhancodes" target="_blank"
                    class="flex items-center space-x-2 px-4 py-3">
                    <i class="ph-fill ph-github-logo text-sm"></i>
                    <span class="text-sm">GitHub</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section
            class="max-w-[80%] m-auto px-6 py-16 md:py-28 flex flex-col-reverse md:flex-row justify-between items-center gap-12">
            <div class="w-full md:w-1/2 space-y-8 text-center md:text-left">
                <h1 class="text-4xl md:text-6xl font-extrabold text-(--primaryText) leading-[1.1] tracking-tight">
                    JavaScript <br><span class="text-(--AccentElements)">Projects</span> <br> Collection
                </h1>
                <p class="text-(--paragraphColor) text-sm md:text-md max-w-md mx-auto md:mx-0 leading-relaxed">
                    A specialized collection of interactive mini-applications designed to showcase mastery in Vanilla
                    JavaScript logic and DOM manipulation.
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                    <button
                        class="bg-(--AccentElements) text-white text-sm px-4 py-3.5 rounded-full font-medium flex items-center justify-center space-x-2 hover:bg-blue-600 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
                        <span><a href="#projects" class="text-white cursor-pointer">Explore Projects</a></span>
                        <i class="ph-bold ph-arrow-right text-sm"></i>
                    </button>
                    <button
                        class="bg-(--white) text-(--primaryText) px-4 py-3.5 rounded-full font-medium flex items-center justify-center space-x-2 shadow-2xl hover:bg-gray-900 hover:text-white hover:shadow-md hover:-translate-y-0.5 transition-all duration-300">
                        <i class="ph-fill ph-github-logo text-sm"></i>
                        <span><a href="https://github.com/khalilkhancodes" target="_blank"
                                class="hover:underline text-sm">View GitHub</a></span>
                    </button>
                </div>
            </div>

            <div class="w-full hidden md:block md:w-1/2 justify-center md:justify-end">
                <div
                    class="relative w-72 h-72 md:w-96 md:h-96 bg-[#ffffff] backdrop-blur-3xl rounded-3xl border border-white shadow-2xl flex items-center justify-center animate-fade-in">
                    <div
                        class="grid grid-cols-2 gap-4 bg-(--paragraphColor)/60 shadow-[5px_5px_15px_rgba(0,0,0,0.3)] p-6 rounded-2xl">
                        <div
                            class="w-20 h-20 bg-(--white) shadow-sm rounded-2xl flex items-center justify-center text-3xl font-bold text-(--primaryText) hover:scale-110 transition-transform duration-300">
                            &lt;/&gt;
                        </div>
                        <div
                            class="w-20 h-20 bg-(--white) shadow-sm rounded-2xl flex items-center justify-center text-3xl font-bold text-(--primaryText) hover:scale-110 transition-transform duration-300">
                            #
                        </div>
                        <div
                            class="w-20 h-20 bg-(--white) shadow-sm rounded-2xl flex items-center justify-center text-3xl font-bold text-(--primaryText) hover:scale-110 transition-transform duration-300">
                            <i class="ph-bold ph-arrows-clockwise"></i>
                        </div>
                        <div
                            class="w-20 h-20 bg-(--white) shadow-sm rounded-2xl flex items-center justify-center text-3xl font-bold text-(--primaryText) hover:scale-110 transition-transform duration-300">
                            <i class="ph-bold ph-spinner-gap animate-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>

</html>
